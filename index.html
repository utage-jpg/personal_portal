<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>冨澤用ポータル</title>
<script src="data.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
/* ============================================================
   Design System
   ============================================================ */
:root {
  --indigo:      #4f46e5;
  --indigo-lt:   #eef2ff;
  --indigo-bd:   #c7d2fe;
  --cyan:        #0891b2;
  --cyan-lt:     #ecfeff;
  --rose:        #f43f5e;
  --rose-lt:     #fff1f2;
  --amber:       #d97706;
  --amber-lt:    #fffbeb;
  --amber-bd:    #fde68a;
  --emerald:     #059669;
  --emerald-lt:  #ecfdf5;
  --emerald-bd:  #a7f3d0;
  --violet:      #7c3aed;
  --violet-lt:   #f5f3ff;
  --violet-bd:   #ddd6fe;
  --overdue:     #dc2626;
  --overdue-bg:  #fef2f2;
  --overdue-bd:  #fca5a5;
  --urgent:      #ea580c;
  --urgent-bg:   #fff7ed;
  --urgent-bd:   #fdba74;
  --soon:        #d97706;
  --soon-bg:     #fffbeb;
  --soon-bd:     #fde68a;
  --normal:      #4f46e5;
  --normal-bg:   #eef2ff;
  --normal-bd:   #c7d2fe;
  --done:        #059669;
  --done-bg:     #ecfdf5;
  --done-bd:     #a7f3d0;
  --today-c:     #f97316;
  --today-bg:    #fff7ed;
  --today-bd:    #fed7aa;
  --bg:          #f4f7ff;
  --surface:     #ffffff;
  --border:      #e5e7eb;
  --border-lt:   #f3f4f6;
  --text:        #111827;
  --text-sub:    #374151;
  --muted:       #6b7280;
  --muted-lt:    #9ca3af;
  --shadow-xs:   0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:   0 1px 4px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:   0 4px 16px rgba(0,0,0,.09), 0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:   0 10px 32px rgba(79,70,229,.14), 0 4px 10px rgba(0,0,0,.06);
  --shadow-card: 0 2px 8px rgba(17,24,39,.06), 0 0 0 1px rgba(17,24,39,.04);
  --radius-sm:   8px;
  --radius:      12px;
  --radius-lg:   16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', 'Meiryo UI', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ============================================================
   Header
   ============================================================ */
.header {
  background: var(--surface);
  height: 58px;
  padding: 0 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow-sm);
  border-bottom: 1px solid var(--border);
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, #4f46e5 0%, #0891b2 40%, #f43f5e 100%);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-logo-mark {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #4f46e5, #0891b2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 900; color: white; letter-spacing: -.02em;
}
.header-title {
  font-size: 16px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -.01em;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 12px;
}
.header-date {
  font-weight: 600;
  color: var(--text-sub);
  letter-spacing: .01em;
}
.header-updated {
  color: var(--muted);
  font-size: 11px;
}

/* ============================================================
   Quickbar
   ============================================================ */
.quickbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 2px;
  height: 52px;
  overflow-x: auto;
  flex-wrap: nowrap;
  scrollbar-width: none;
}
.quickbar::-webkit-scrollbar { display: none; }

.qlink {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 5px 11px;
  border-radius: var(--radius-sm);
  text-decoration: none;
  color: var(--muted);
  white-space: nowrap;
  transition: background .15s, color .15s, transform .12s, box-shadow .15s;
  cursor: pointer;
  border: none;
  background: transparent;
  font-family: inherit;
  flex-shrink: 0;
  min-width: 56px;
  position: relative;
}
.qlink:hover {
  background: var(--bg);
  color: var(--text);
  transform: translateY(-1px);
}
.qlink:active { transform: translateY(0); }

.q-badge {
  width: 26px; height: 26px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
  color: white;
  letter-spacing: -.02em;
  flex-shrink: 0;
  transition: transform .12s;
}
.qlink:hover .q-badge { transform: scale(1.1); }
.q-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .01em;
  opacity: .8;
}
.qbar-sep {
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}
.qbar-group-label {
  font-size: 8.5px;
  font-weight: 700;
  color: var(--muted-lt);
  letter-spacing: .06em;
  text-transform: uppercase;
  padding: 0 4px 0 8px;
  white-space: nowrap;
  flex-shrink: 0;
  align-self: center;
}

/* ============================================================
   Subheader (stats bar)
   ============================================================ */
.subheader {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.alert-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}
.alert-pill::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.alert-pill.danger {
  background: var(--overdue-bg);
  color: var(--overdue);
  border: 1.5px solid var(--overdue-bd);
}
.alert-pill.danger::before { background: var(--overdue); }
.alert-pill.warn {
  background: var(--soon-bg);
  color: var(--amber);
  border: 1.5px solid var(--soon-bd);
}
.alert-pill.warn::before { background: var(--amber); }
.alert-pill.ok {
  background: var(--done-bg);
  color: var(--emerald);
  border: 1.5px solid var(--done-bd);
}
.alert-pill.ok::before { background: var(--emerald); }

.stat-chips { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.stat-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 12px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--muted);
}
.stat-chip .num { font-size: 16px; font-weight: 900; line-height: 1; }
.chip-overdue .num { color: var(--overdue); }
.chip-urgent  .num { color: var(--urgent); }
.chip-soon    .num { color: var(--amber); }
.chip-done    .num { color: var(--emerald); }

/* ============================================================
   Main Layout
   ============================================================ */
.layout {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 0;
  min-height: calc(100vh - 162px);
}
.sidebar {
  border-right: 1px solid var(--border);
  background: var(--surface);
  padding: 20px 16px;
}
.main-col { padding: 24px 24px 48px; }

/* ============================================================
   Section Title
   ============================================================ */
.section-title {
  font-size: 10.5px;
  font-weight: 800;
  color: var(--muted);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-title::before {
  content: '';
  display: block;
  width: 3px; height: 14px;
  background: var(--indigo);
  border-radius: 2px;
  flex-shrink: 0;
}

/* ============================================================
   Calendar
   ============================================================ */
.cal-nav-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.cal-month-label { font-size: 15px; font-weight: 800; color: var(--text); }
.cal-btn {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  width: 30px; height: 30px;
  cursor: pointer;
  font-size: 11px;
  color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, border-color .15s, color .15s;
  font-weight: 700;
}
.cal-btn:hover { background: var(--indigo-lt); border-color: var(--indigo-bd); color: var(--indigo); }

.cal-weekdays {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  text-align: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--muted-lt);
  margin-bottom: 6px;
  letter-spacing: .04em;
}
.cal-weekdays span:nth-child(1) { color: var(--rose); }
.cal-weekdays span:nth-child(7) { color: #3b82f6; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 3px;
}
.cal-cell {
  aspect-ratio: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  font-size: 12px;
  font-weight: 500;
  position: relative;
  padding-bottom: 7px;
  cursor: default;
  transition: background .12s;
}
.cal-cell:not(.other):hover { background: var(--bg); }
.cal-cell.other  { color: #d1d5db; }
.cal-cell.sat    { color: #3b82f6; }
.cal-cell.sun    { color: var(--rose); }
.cal-cell.today  {
  background: var(--indigo);
  color: #fff !important;
  font-weight: 800;
  border-radius: var(--radius-sm);
  box-shadow: 0 0 0 2.5px white, 0 0 0 4px var(--indigo);
}
.cal-dots { position: absolute; bottom: 3px; display: flex; gap: 2px; }
.cal-dot  { width: 5px; height: 5px; border-radius: 50%; transition: transform .12s; }
.cal-dot.d-overdue { background: var(--overdue); }
.cal-dot.d-urgent  { background: var(--urgent); }
.cal-dot.d-soon    { background: var(--amber); }
.cal-dot.d-normal  { background: var(--indigo); }
.cal-dot.d-done    { background: var(--emerald); }

@keyframes calPulse {
  0%,100% { transform: scale(1);   opacity: 1; }
  50%      { transform: scale(2.6); opacity: 0.45; }
}
.cal-dot.pulsing { animation: calPulse .75s ease-in-out infinite; }
.cal-cell.highlighted {
  background: var(--indigo-lt);
  outline: 1.5px solid var(--indigo-bd);
  border-radius: var(--radius-sm);
}

.cal-legend {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--muted); }
.legend-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* Calendar tooltip */
#calTooltip {
  position: fixed; z-index: 9999; pointer-events: none;
  background: #1e2433;
  color: #f1f5f9;
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 11.5px;
  line-height: 1.65;
  max-width: 240px;
  min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,.28);
  display: none;
}
#calTooltip .tt-date  { font-size: 10px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; letter-spacing: .03em; }
#calTooltip .tt-item  { display: flex; align-items: flex-start; gap: 6px; margin-top: 4px; }
#calTooltip .tt-dot   { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
#calTooltip .tt-title { font-size: 11.5px; }

/* ============================================================
   Sidebar Links
   ============================================================ */
.sidebar-links { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.sidebar-link-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  width: 100%;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 12.5px;
  font-weight: 700;
  text-decoration: none;
  transition: opacity .15s, transform .12s, box-shadow .15s;
  position: relative;
  letter-spacing: .01em;
}
.sidebar-link-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
.sidebar-link-btn:active { transform: translateY(0); }
.sidebar-link-btn.today-btn {
  background: linear-gradient(135deg, var(--today-c), #fb923c);
  color: #fff;
  box-shadow: 0 2px 10px rgba(249,115,22,.3);
}
.sidebar-link-btn.secondary {
  background: var(--bg);
  color: var(--text-sub);
  border: 1.5px solid var(--border);
}
.sidebar-link-btn.secondary:hover { background: var(--indigo-lt); border-color: var(--indigo-bd); color: var(--indigo); }

.today-count-badge {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,.25);
  color: #fff;
  border-radius: 10px;
  font-size: 11px; font-weight: 800;
  padding: 1px 8px;
  min-width: 22px; text-align: center;
}

/* ============================================================
   今日やること — チェックリスト
   ============================================================ */
.todo-list { list-style: none; display: flex; flex-direction: column; }
.todo-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 6px;
  border-radius: var(--radius-sm);
  transition: background .12s;
  border-bottom: 1px solid var(--border-lt);
}
.todo-item:last-child { border-bottom: none; }
.todo-item:hover { background: var(--bg); }
.todo-item.done { opacity: .5; }

.todo-check {
  width: 22px; height: 22px; flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid var(--muted-lt);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, background .15s;
  padding: 0; color: transparent;
}
.todo-check:hover { border-color: var(--indigo); }
.todo-item.done .todo-check { border-color: var(--emerald); background: var(--emerald); color: #fff; }

.todo-name {
  flex: 1; font-size: 14px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.todo-item.done .todo-name { text-decoration: line-through; color: var(--muted); }

.todo-dl {
  font-size: 11px; font-weight: 600; color: var(--muted);
  white-space: nowrap; flex-shrink: 0;
}
.todo-dl.overdue { color: var(--overdue); }
.todo-dl.soon    { color: var(--amber); }
.todo-dl.urgent  { color: var(--urgent); }

/* ============================================================
   タスク一覧 — シンプルリスト
   ============================================================ */
.task-simple-list {
  list-style: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--surface);
}
.task-simple-item { border-bottom: 1px solid var(--border-lt); }
.task-simple-item:last-child { border-bottom: none; }

.task-simple-row {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 14px; cursor: default;
}
.task-simple-item:hover .task-simple-row { background: var(--bg); }
.task-simple-item.done .task-simple-row { opacity: .55; }

.task-s-check {
  width: 20px; height: 20px; flex-shrink: 0;
  border-radius: 50%;
  border: 2px solid var(--muted-lt);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s, background .15s;
  padding: 0; color: transparent;
}
.task-s-check:hover { border-color: var(--indigo); }
.task-simple-item.done .task-s-check { border-color: var(--emerald); background: var(--emerald); color: #fff; }

.task-s-main { flex: 1; min-width: 0; }
.task-s-title {
  font-size: 13.5px; font-weight: 600; color: var(--text);
  display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4;
}
.task-simple-item.done .task-s-title { text-decoration: line-through; color: var(--muted); }
.task-s-sub {
  font-size: 11px; color: var(--muted); display: block; margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.task-s-date {
  font-size: 11px; color: var(--muted); white-space: nowrap; flex-shrink: 0; font-weight: 600;
}
.task-s-date.overdue { color: var(--overdue); }
.task-s-date.soon    { color: var(--amber); }
.task-s-date.urgent  { color: var(--urgent); }

.task-s-cat {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 99px; background: var(--indigo-lt); color: var(--indigo);
  border: 1px solid var(--indigo-bd); white-space: nowrap; flex-shrink: 0;
}

.task-s-actions { display: flex; gap: 2px; flex-shrink: 0; }
.task-s-btn {
  width: 28px; height: 28px; border: none; background: transparent;
  border-radius: 6px; cursor: pointer; color: var(--muted-lt);
  display: flex; align-items: center; justify-content: center;
  transition: background .12s, color .12s; padding: 0;
}
.task-s-btn:hover { background: var(--indigo-lt); color: var(--indigo); }
.task-s-btn.active { background: var(--indigo-lt); color: var(--indigo); }

.task-s-body {
  display: none;
  padding: 0 14px 14px 50px;
  border-top: 1px solid var(--border-lt);
  background: var(--bg);
}
.task-simple-item.open .task-s-body { display: block; }
.task-s-expand svg { transition: transform .2s; }
.task-simple-item.open .task-s-expand svg { transform: rotate(180deg); }

.task-s-notes {
  font-size: 12px; line-height: 1.75; color: var(--text-sub);
  white-space: pre-wrap; background: var(--surface);
  border-radius: 6px; padding: 10px 12px;
  border: 1px solid var(--border); margin: 10px 0 8px;
}
.task-s-source {
  font-size: 10.5px; color: var(--muted-lt);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 6px;
  padding-top: 8px; border-top: 1px dashed var(--border);
}

/* 完了済みセクション */
.done-section-btn {
  width: 100%; display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; border: none; background: none;
  font-size: 12px; font-weight: 600; color: var(--muted);
  cursor: pointer; font-family: inherit; text-align: left;
  border-top: 1px solid var(--border); transition: color .15s;
}
.done-section-btn:hover { color: var(--text); }
.done-section-btn svg { transition: transform .2s; flex-shrink: 0; }
.done-section-btn.open svg { transform: rotate(180deg); }
.done-section-count {
  background: var(--done-bg); color: var(--emerald);
  border: 1px solid var(--done-bd); border-radius: 99px;
  font-size: 10px; font-weight: 800; padding: 1px 8px;
}

/* ── タスク追加ボタン ── */
.add-task-btn {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; font-size: 11.5px; font-weight: 700;
  border-radius: 6px; border: 1.5px solid var(--indigo-bd);
  background: var(--indigo-lt); color: var(--indigo);
  cursor: pointer; font-family: inherit; transition: all .15s;
}
.add-task-btn:hover { background: var(--indigo); color: #fff; border-color: var(--indigo); }

/* 手動タスク削除 */
.task-delete-btn {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; font-size: 10.5px; font-weight: 600;
  border-radius: 5px; border: 1px solid #fca5a5;
  background: #fef2f2; color: #dc2626;
  cursor: pointer; font-family: inherit; transition: all .12s;
}
.task-delete-btn:hover { background: #dc2626; color: #fff; border-color: #dc2626; }

/* ============================================================
   Notice Section
   ============================================================ */
.notice-section { padding: 10px 24px 48px; border-top: 2px solid var(--border); }
.notice-list { display: flex; flex-direction: column; gap: 10px; }
.notice-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--violet-bd);
  border-top: 3px solid var(--violet);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: box-shadow .2s, transform .15s;
}
.notice-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.notice-head {
  padding: 13px 16px;
  cursor: pointer;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  user-select: none;
}

.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;

  align-items: center; justify-content: center;
}

  from { opacity: 0; transform: translateY(10px) scale(.98); }
  to   { opacity: 1; transform: none; }

<script>
// ============================================================
// SVG Icons
// ============================================================
const IC_PENCIL  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const IC_TRASH   = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>`;
const IC_CHEVRON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>`;
const IC_CHECK   = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const IC_STAR    = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;
const IC_CAL     = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;

// ============================================================
// localStorage / Firestore 同期
// ============================================================
const LS_STATE          = 'workplace_report_states_v1';
const LS_TODAY          = 'workplace_today_v1';
const LS_MEMO           = 'workplace_memos_v1';
const LS_HIDDEN_NOTICES = 'workplace_hidden_notices_v1';
const LS_EDITS          = 'workplace_task_edits_v1';
const LS_MANUAL_EVENTS  = 'workplace_manual_events_v1';

function lsGet(key)       { try { return JSON.parse(localStorage.getItem(key) || '{}'); } catch { return {}; } }
function lsSet(key, val)  { localStorage.setItem(key, JSON.stringify(val)); _scheduleFirestoreSync(); }

// ── Firebase 初期化 ──
const _fbApp = firebase.initializeApp({
  apiKey:            "AIzaSyCbO80gC8haR-zxhpyGLrgUau2JI_sm3MY",
  authDomain:        "personal-portal-7d8f7.firebaseapp.com",
  projectId:         "personal-portal-7d8f7",
  storageBucket:     "personal-portal-7d8f7.firebasestorage.app",
  messagingSenderId: "1030243579322",
  appId:             "1:1030243579322:web:920a69d39f579557731983"
});
const _db        = firebase.firestore(_fbApp);
const _FSREF     = _db.collection('portal_state').doc('main');
let _suppressSnap = false;
let _syncTimer    = null;

function _scheduleFirestoreSync() {
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(_syncToFirestore, 800);
}

function _syncToFirestore() {
  const payload = {
    states:        lsGet(LS_STATE),
    today:         lsGet(LS_TODAY),
    memo:          lsGet(LS_MEMO),
    hiddenNotices: lsGet(LS_HIDDEN_NOTICES),
    edits:         lsGet(LS_EDITS),
    manualTasks:   (() => { try { return JSON.parse(localStorage.getItem(LS_MANUAL)||'[]'); } catch { return []; } })(),
    manualEvents:  (() => { try { return JSON.parse(localStorage.getItem(LS_MANUAL_EVENTS)||'[]'); } catch { return []; } })()
  };
  _suppressSnap = true;
  _FSREF.set(payload).then(() => { setTimeout(() => { _suppressSnap = false; }, 1500); })
                     .catch(e => { console.warn('Firestore書き込みエラー:', e); _suppressSnap = false; });
}

async function _loadFromFirestore() {
  try {
    const snap = await _FSREF.get();
    if (!snap.exists) return false;
    const d = snap.data();
    if (d.states)        localStorage.setItem(LS_STATE,          JSON.stringify(d.states));
    if (d.today)         localStorage.setItem(LS_TODAY,          JSON.stringify(d.today));
    if (d.memo)          localStorage.setItem(LS_MEMO,           JSON.stringify(d.memo));
    if (d.hiddenNotices) localStorage.setItem(LS_HIDDEN_NOTICES, JSON.stringify(d.hiddenNotices));
    if (d.edits)         localStorage.setItem(LS_EDITS,          JSON.stringify(d.edits));
    if (d.manualTasks)   localStorage.setItem(LS_MANUAL,         JSON.stringify(d.manualTasks));
    if (d.manualEvents)  localStorage.setItem(LS_MANUAL_EVENTS,  JSON.stringify(d.manualEvents));
    return true;
  } catch(e) {
    console.warn('Firestore読み込みエラー（localStorage で続行）:', e);
    return false;
  }
}

function _setupFirestoreListener() {
  _FSREF.onSnapshot(snap => {
    if (_suppressSnap || !snap.exists) return;
    const d = snap.data();
    if (d.states)        localStorage.setItem(LS_STATE,          JSON.stringify(d.states));
    if (d.today)         localStorage.setItem(LS_TODAY,          JSON.stringify(d.today));
    if (d.memo)          localStorage.setItem(LS_MEMO,           JSON.stringify(d.memo));
    if (d.hiddenNotices) localStorage.setItem(LS_HIDDEN_NOTICES, JSON.stringify(d.hiddenNotices));
    if (d.edits)         localStorage.setItem(LS_EDITS,          JSON.stringify(d.edits));
    if (d.manualTasks)   localStorage.setItem(LS_MANUAL,         JSON.stringify(d.manualTasks));
    if (d.manualEvents)  localStorage.setItem(LS_MANUAL_EVENTS,  JSON.stringify(d.manualEvents));
    // 別デバイスからの変更を反映
    APP_DATA.tasks  = APP_DATA.tasks.filter(t => !t.id.startsWith('manual_'));
    APP_DATA.events = (APP_DATA.events||[]).filter(e => !e.id.startsWith('ev_manual_'));
    loadManualTasks();
    loadManualEvents();
    applyStoredStates();
    applyStoredEdits();
    renderAll();
  });
}

function saveState(id, status)  { const s = lsGet(LS_STATE); s[id] = { status, at: new Date().toISOString() }; lsSet(LS_STATE, s); }
function clearState(id)         { const s = lsGet(LS_STATE); delete s[id]; lsSet(LS_STATE, s); }
function applyStoredStates()    { const s = lsGet(LS_STATE); APP_DATA.tasks.forEach(t => { if (s[t.id]) t.status = s[t.id].status; }); }
function applyStoredEdits()     { const e = lsGet(LS_EDITS); APP_DATA.tasks.forEach(t => { if (e[t.id]) Object.assign(t, e[t.id]); }); }
function saveEdit(id, fields)   { const e = lsGet(LS_EDITS); e[id] = Object.assign(e[id]||{}, fields); lsSet(LS_EDITS, e); }
function isTodayTask(id)        { return !!lsGet(LS_TODAY)[id]; }
function setTodayTask(id, val)  { const s = lsGet(LS_TODAY); if (val) s[id] = true; else delete s[id]; lsSet(LS_TODAY, s); }
function isDeadlineToday(t)     { return dayDiff(t.deadline) === 0; }
function isInTodaySection(t) {
  if (!isTodayTask(t.id) && !isDeadlineToday(t)) return false;
  if (taskState(t) === 'done' && dayDiff(t.deadline) !== null && dayDiff(t.deadline) < 0) return false;
  return true;
}
function todayCount()           { return APP_DATA.tasks.filter(t => taskState(t) !== 'done' && isInTodaySection(t)).length; }
function getMemo(id)            { return lsGet(LS_MEMO)[id] || ''; }
function setMemo(id, text)      { const s = lsGet(LS_MEMO); if (text) s[id] = text; else delete s[id]; lsSet(LS_MEMO, s); }
function isNoticeHidden(id)     { return !!lsGet(LS_HIDDEN_NOTICES)[id]; }
function hideNotice(id)         { const s = lsGet(LS_HIDDEN_NOTICES); s[id] = true; lsSet(LS_HIDDEN_NOTICES, s); renderNotices(); }
function restoreAllNotices()    { lsSet(LS_HIDDEN_NOTICES, {}); renderNotices(); }

// ============================================================
// Utilities
// ============================================================
const TODAY = new Date(); TODAY.setHours(0,0,0,0);

function dayDiff(str) {
  if (!str) return null;
  const d = new Date(str); d.setHours(0,0,0,0);
  return Math.ceil((d - TODAY) / 86400000);
}
function taskState(t) {
  if (t.status === '完了') return 'done';
  if (t.urgent && !t.deadline) return 'urgent';
  const diff = dayDiff(t.deadline);
  if (diff === null) return 'urgent';
  if (diff < 0)  return 'overdue';
  if (diff <= 7) return 'soon';
  return 'normal';
}
function fmtDeadline(t) {
  if (!t.deadline) return '期日未設定 — 早急対応';
  const d = new Date(t.deadline);
  const dow = ['日','月','火','水','木','金','土'][d.getDay()];
  let s = `${d.getMonth()+1}/${d.getDate()}（${dow}）`;
  if (d.getHours() || d.getMinutes()) s += ` ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}まで`;
  const diff = dayDiff(t.deadline);
  if (diff < 0)      s += `  ＊${Math.abs(diff)}日超過`;
  else if (diff===0) s += '  ＊本日期限';
  else               s += `  ＊残り${diff}日`;
  return s;
}
function stateBadgeHTML(state) {
  const map = { overdue:['b-overdue','期限切れ'], urgent:['b-urgent','早急対応'], soon:['b-soon','期限迫る'], normal:['b-normal','未対応'], done:['b-done','完了'] };
  const [cls, label] = map[state];
  return `<span class="badge ${cls}">${label}</span>`;
}
function dlClass(state) { return {overdue:'overdue',urgent:'urgent',soon:'soon',normal:'normal',done:'normal'}[state]; }

// ============================================================
// Header
// ============================================================
function renderHeader() {
  const now = new Date();
  const dow = ['日','月','火','水','木','金','土'][now.getDay()];
  document.getElementById('headerDate').textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日（${dow}）`;
  document.getElementById('lastUpdated').textContent = `最終更新 ${APP_DATA.tasks[0]?.addedDate ?? ''}`;
}

// ============================================================
// Subheader
// ============================================================
function renderSubheader() {
  let overdue=0, urgent=0, soon=0, done=0;
  APP_DATA.tasks.forEach(t => {
    const s = taskState(t);
    if (s==='overdue') overdue++; else if (s==='urgent') urgent++;
    else if (s==='soon') soon++;  else if (s==='done') done++;
  });
  let pillHTML = '';
  if (overdue>0||urgent>0) {
    const p = [];
    if (overdue) p.push(`期限切れ ${overdue}件`);
    if (urgent)  p.push(`早急対応 ${urgent}件`);
    pillHTML = `<div class="alert-pill danger">${p.join('　/　')}</div>`;
  } else if (soon>0) {
    pillHTML = `<div class="alert-pill warn">期限迫るタスク ${soon}件</div>`;
  } else {
    pillHTML = `<div class="alert-pill ok">差し迫ったタスクはありません</div>`;
  }
  document.getElementById('alertPill').innerHTML = pillHTML;
  document.getElementById('statChips').innerHTML = `
    <div class="stat-chip chip-overdue"><span class="num">${overdue}</span>期限切れ</div>
    <div class="stat-chip chip-urgent"><span class="num">${urgent}</span>早急</div>
    <div class="stat-chip chip-soon"><span class="num">${soon}</span>期限迫る</div>
    <div class="stat-chip chip-done"><span class="num">${done}</span>完了</div>
  `;
  const cnt = todayCount();
  const badge = document.getElementById('todayCountBadge');
  if (badge) badge.textContent = cnt;
}

// ============================================================
// 日付表示ヘルパー
// ============================================================
function fmtDateShort(t) {
  if (t.urgent && !t.deadline) return null;
  if (!t.deadline) return null;
  const d = new Date(t.deadline);
  const diff = dayDiff(t.deadline);
  let s = `${d.getMonth()+1}/${d.getDate()}`;
  if (diff < 0)      s += `（${Math.abs(diff)}日超過）`;
  else if (diff ===0) s += '（本日）';
  else if (diff <= 7) s += `（残${diff}日）`;
  return s;
}
function dateClass(state) {
  return {overdue:'overdue', urgent:'urgent', soon:'soon', normal:'', done:''}[state] || '';
}

// ============================================================
// 今日やること — チェックリスト アイテム
// ============================================================
function buildTodayItem(t) {
  const state  = taskState(t);
  const isDone = state === 'done';
  const dl     = fmtDateShort(t);
  const dlCls  = t.urgent && !t.deadline ? 'urgent' : dateClass(state);
  const li = document.createElement('li');
  li.className = `todo-item${isDone ? ' done' : ''}`;
  li.id = `todo-${t.id}`;
  li.innerHTML = `
    <button class="todo-check" onclick="toggleDoneItem('${t.id}')" title="${isDone?'未対応に戻す':'完了にする'}">${isDone ? IC_CHECK : ''}</button>
    <span class="todo-name">${t.title}</span>
    ${t.urgent && !t.deadline
      ? `<span class="todo-dl urgent">⚡緊急</span>`
      : dl ? `<span class="todo-dl ${dlCls}">${dl}</span>` : ''}
  `;
  return li;
}

function toggleDoneItem(id) {
  const t = APP_DATA.tasks.find(x => x.id === id);
  if (!t) return;
  if (taskState(t) === 'done') { t.status = '未対応'; clearState(id); }
  else                         { t.status = '完了';   saveState(id, '完了'); }
  renderAll();
}

// ============================================================
// タスク一覧 — シンプルリスト アイテム
// ============================================================
function buildTaskItem(t) {
  const state  = taskState(t);
  const isDone = state === 'done';
  const dl     = fmtDateShort(t);
  const dlCls  = t.urgent && !t.deadline ? 'urgent' : dateClass(state);
  const isPin  = isTodayTask(t.id);
  const memo   = getMemo(t.id);

  const li = document.createElement('li');
  li.className = `task-simple-item${isDone ? ' done' : ''}`;
  li.id = `titem-${t.id}`;
  li.innerHTML = `
    <div class="task-simple-row">
      <button class="task-s-check" onclick="toggleDoneItem('${t.id}')" title="${isDone?'未対応に戻す':'完了にする'}">${isDone ? IC_CHECK : ''}</button>
      <div class="task-s-main">
        <span class="task-s-title">${t.title}</span>
        <span class="task-s-sub">${t.source}</span>
      </div>
      ${t.urgent && !t.deadline
        ? `<span class="task-s-date urgent">⚡緊急</span>`
        : dl ? `<span class="task-s-date ${dlCls}">${dl}</span>` : ''}
      <span class="task-s-cat">${t.category}</span>
      <div class="task-s-actions">
        <button class="task-s-btn${isPin?' active':''}" onclick="togglePinItem('${t.id}')" title="${isPin?'今日やることから外す':'今日やることに追加'}">${IC_STAR}</button>
        <button class="task-s-btn" onclick="openEditModal('${t.id}')" title="編集">${IC_PENCIL}</button>
        <button class="task-s-btn task-s-expand" onclick="toggleTaskItem('${t.id}')" title="詳細">${IC_CHEVRON}</button>
      </div>
    </div>
    <div class="task-s-body" id="tbody-${t.id}">
      ${t.notes ? `<div class="task-s-notes">${t.notes}</div>` : ''}
      ${memo ? `<div class="task-s-notes" style="background:#fffdf0;border-color:#fde68a;margin-top:6px;"><strong style="font-size:10px;color:#92400e;">MEMO</strong><br>${memo}</div>` : ''}
      <div class="task-s-source">
        <span>${t.sourceFile ? `📂 ${t.sourceFile}　` : ''}登録日：${t.addedDate}</span>
        ${t._manual ? `<button class="task-delete-btn" onclick="deleteManualTask('${t.id}')">削除</button>` : ''}
      </div>
    </div>
  `;
  return li;
}

function toggleTaskItem(id) {
  const li = document.getElementById(`titem-${id}`);
  if (!li) return;
  li.classList.toggle('open');
  document.querySelectorAll('.cal-dot.pulsing').forEach(d => d.classList.remove('pulsing'));
  document.querySelectorAll('.cal-cell.highlighted').forEach(c => c.classList.remove('highlighted'));
  if (li.classList.contains('open')) {
    const t = APP_DATA.tasks.find(x => x.id === id);
    if (t && t.deadline) {
      const cell = document.querySelector(`.cal-cell[data-date="${t.deadline.substring(0,10)}"]`);
      if (cell) { cell.classList.add('highlighted'); cell.querySelectorAll('.cal-dot').forEach(d => d.classList.add('pulsing')); }
    }
  }
}

function togglePinItem(id) {
  setTodayTask(id, !isTodayTask(id));
  renderAll();
}

function markDone(id)   { const t=APP_DATA.tasks.find(x=>x.id===id); if(!t) return; t.status='完了';  saveState(id,'完了');  renderAll(); }
function markUndone(id) { const t=APP_DATA.tasks.find(x=>x.id===id); if(!t) return; t.status='未対応'; clearState(id);       renderAll(); }

function renderTasks() {
  const ORDER = {overdue:0, urgent:1, soon:2, normal:3};
  const allTasks = APP_DATA.tasks;
  const active = allTasks.filter(t => taskState(t) !== 'done').sort((a,b) => {
    const sa = taskState(a), sb = taskState(b);
    if (ORDER[sa] !== ORDER[sb]) return ORDER[sa] - ORDER[sb];
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return -1; if (!b.deadline) return 1;
    return new Date(a.deadline) - new Date(b.deadline);
  });
  const done = allTasks.filter(t => taskState(t) === 'done');

  const wrap = document.getElementById('taskList');
  wrap.innerHTML = '';

  if (active.length === 0 && done.length === 0) {
    wrap.innerHTML = '<div class="empty-state">タスクはありません</div>';
    return;
  }

  const ul = document.createElement('ul');
  ul.className = 'task-simple-list';
  if (active.length === 0) {
    ul.innerHTML = '<li style="padding:16px;text-align:center;color:var(--muted);font-size:13px;">未対応のタスクはありません</li>';
  } else {
    active.forEach(t => ul.appendChild(buildTaskItem(t)));
  }

  // 完了済みトグル
  if (done.length > 0) {
    const doneBtn = document.createElement('button');
    doneBtn.className = 'done-section-btn';
    doneBtn.id = 'doneSectionBtn';
    doneBtn.innerHTML = `${IC_CHEVRON}<span>完了済み</span><span class="done-section-count">${done.length}</span>`;
    doneBtn.onclick = () => {
      const isOpen = doneBtn.classList.toggle('open');
      doneUl.style.display = isOpen ? 'block' : 'none';
    };
    ul.appendChild(doneBtn);
    const doneUl = document.createElement('ul');
    doneUl.className = 'task-simple-list';
    doneUl.style.cssText = 'display:none;border:none;border-radius:0;border-top:1px solid var(--border-lt);';
    done.forEach(t => doneUl.appendChild(buildTaskItem(t)));
    ul.appendChild(doneUl);
  }

  wrap.appendChild(ul);
}

function saveMemo(id) {
  const ta = document.getElementById(`memo-text-${id}`);
  if (!ta) return;
  setMemo(id, ta.value.trim());
  renderAll();
}

// ============================================================
// Calendar
// ============================================================
let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();
document.getElementById('calPrev').onclick = () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
document.getElementById('calNext').onclick = () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };

function dotsForDate(y,m,d) {
  const key = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const taskDots = APP_DATA.tasks.filter(t=>t.deadline&&t.deadline.substring(0,10)===key).map(t=>{
    const s=taskState(t);
    return s==='done'?'d-done':s==='overdue'?'d-overdue':s==='urgent'?'d-urgent':s==='soon'?'d-soon':'d-normal';
  });
  const evDots = (APP_DATA.events||[]).filter(ev=>ev.date&&ev.date.substring(0,10)===key).map(()=>'d-event');
  return [...taskDots, ...evDots];
}
function tasksForDate(dateKey) {
  return APP_DATA.tasks.filter(t=>t.deadline&&t.deadline.substring(0,10)===dateKey);
}
function eventsForDate(dateKey) {
  return (APP_DATA.events||[]).filter(ev=>ev.date&&ev.date.substring(0,10)===dateKey);
}
function dotColorHex(state) {
  return {overdue:'#dc2626',urgent:'#ea580c',soon:'#d97706',normal:'#4f46e5',done:'#059669'}[state]||'#9ca3af';
}

function renderCalendar() {
  const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('calMonthLabel').textContent = `${calYear}年 ${MONTHS[calMonth]}`;
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  const first=new Date(calYear,calMonth,1), last=new Date(calYear,calMonth+1,0);
  let offset=first.getDay();
  for(let i=0;i<offset;i++){const d=new Date(calYear,calMonth,1-(offset-i));addCell(grid,d.getDate(),'other',[],null);}
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(calYear,calMonth,d), dow=date.getDay();
    const isToday=date.toDateString()===TODAY.toDateString();
    let cls=isToday?'today':'';
    if(!isToday){if(dow===6)cls='sat';if(dow===0)cls='sun';}
    const dateKey=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    addCell(grid,d,cls,dotsForDate(calYear,calMonth,d),dateKey);
  }
  const rem=grid.children.length%7===0?0:7-(grid.children.length%7);
  for(let i=1;i<=rem;i++) addCell(grid,i,'other',[],null);
}
function addCell(grid,num,cls,dots,dateKey){
  const cell=document.createElement('div'); cell.className=`cal-cell ${cls}`; cell.textContent=num;
  if(dateKey) cell.setAttribute('data-date', dateKey);
  if(dots.length>0){
    const de=document.createElement('div'); de.className='cal-dots';
    dots.slice(0,3).forEach(c=>{const dot=document.createElement('div');dot.className=`cal-dot ${c}`;de.appendChild(dot);});
    cell.appendChild(de);
    cell.addEventListener('mouseenter', e => showCalTooltip(e, dateKey));
    cell.addEventListener('mousemove',  e => moveCalTooltip(e));
    cell.addEventListener('mouseleave', hideCalTooltip);
  }
  grid.appendChild(cell);
}

const _tt = document.getElementById('calTooltip');
function showCalTooltip(e, dateKey) {
  const tasks  = tasksForDate(dateKey);
  const events = eventsForDate(dateKey);
  if (!tasks.length && !events.length) return;
  const d = new Date(dateKey);
  const dow = ['日','月','火','水','木','金','土'][d.getDay()];
  let html = `<div class="tt-date">${d.getMonth()+1}/${d.getDate()}（${dow}）</div>`;
  events.forEach(ev => {
    const t = new Date(ev.date);
    const timeStr = (t.getHours()||t.getMinutes())
      ? ` ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}${ev.endTime?'〜'+ev.endTime:''}`
      : '';
    html += `<div class="tt-item"><div class="tt-dot" style="background:#0891b2"></div><div class="tt-title">📅 ${ev.title}${timeStr}</div></div>`;
  });
  tasks.forEach(t => {
    const s = taskState(t);
    const color = dotColorHex(s);
    const dl = t.deadline && (new Date(t.deadline).getHours()||new Date(t.deadline).getMinutes())
      ? ` ${String(new Date(t.deadline).getHours()).padStart(2,'0')}:${String(new Date(t.deadline).getMinutes()).padStart(2,'0')}まで`
      : '';
    html += `<div class="tt-item"><div class="tt-dot" style="background:${color}"></div><div class="tt-title">${t.title}${dl}</div></div>`;
  });
  _tt.innerHTML = html;
  _tt.style.display = 'block';
  moveCalTooltip(e);
}
function moveCalTooltip(e) {
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 250 > vw) x = e.clientX - 260;
  if (y + _tt.offsetHeight + 10 > vh) y = e.clientY - _tt.offsetHeight - 10;
  _tt.style.left = x + 'px';
  _tt.style.top  = y + 'px';
}
function hideCalTooltip() { _tt.style.display = 'none'; }

      card.innerHTML=`
        <div class="notice-head" onclick="this.closest('.notice-card').classList.toggle('open')">

}

// ============================================================
// イベント ユーティリティ
// ============================================================
function eventDayDiff(ev) {
  if (!ev.date) return null;
  const d = new Date(ev.date); d.setHours(0,0,0,0);
  return Math.ceil((d - TODAY) / 86400000);
}
function isEventToday(ev)  { return eventDayDiff(ev) === 0; }
function isEventPast(ev)   { const diff = eventDayDiff(ev); return diff !== null && diff < 0; }
function fmtEventTime(ev) {
  const d = new Date(ev.date);
  if (!d.getHours() && !d.getMinutes()) return '終日';
  let s = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  if (ev.endTime) s += `〜${ev.endTime}`;
  return s;
}
function fmtEventDateFull(ev) {
  const d = new Date(ev.date);
  const dow = ['日','月','火','水','木','金','土'][d.getDay()];
  let s = `${d.getMonth()+1}/${d.getDate()}（${dow}）`;
  const t = fmtEventTime(ev);
  if (t !== '終日') s += ` ${t}`;
  return s;
}

function buildTodayEventItem(ev) {
  const timeStr = fmtEventTime(ev);
  const li = document.createElement('li');
  li.className = 'todo-event-item';
  li.innerHTML = `
    <div class="todo-event-icon">${IC_CAL}</div>
    <span class="todo-event-time">${timeStr}</span>
    <span class="todo-event-name">${ev.title}</span>
    ${ev.location ? `<span class="todo-event-loc">📍${ev.location}</span>` : ''}
  `;
  return li;
}

function buildEventItem(ev) {
  const diff   = eventDayDiff(ev);
  const isPast = diff !== null && diff < 0;
  const isToday = diff === 0;
  let badgeCls = '', badgeLabel = '';
  if (isToday)       { badgeCls = 'is-today'; badgeLabel = '本日'; }
  else if (isPast)   { badgeCls = 'is-past';  badgeLabel = `${Math.abs(diff)}日前`; }
  else if (diff <= 7){ badgeCls = 'is-soon';  badgeLabel = `${diff}日後`; }
  else               { badgeLabel = `${diff}日後`; }

  const fmtDate = fmtEventDateFull(ev);
  const li = document.createElement('li');
  li.className = `event-item${isPast ? ' past' : ''}`;
  li.innerHTML = `
    <div class="event-icon-col">${IC_CAL}</div>
    <div class="event-main">
      <div class="event-title">${ev.title}</div>
      <div class="event-sub">
        <span class="event-sub-time">${fmtDate}</span>
        ${ev.location ? `<span class="event-sub-loc">📍${ev.location}</span>` : ''}
        ${ev.source && ev.source !== '手動登録' ? `<span>${ev.source}</span>` : ''}
      </div>
      ${ev.notes ? `<div style="font-size:11px;color:var(--text-sub);margin-top:5px;line-height:1.65;white-space:pre-wrap;">${ev.notes}</div>` : ''}
    </div>
    ${badgeLabel ? `<span class="event-day-badge ${badgeCls}">${badgeLabel}</span>` : ''}
    <div class="event-actions">
      ${ev._manual ? `<button class="task-s-btn" onclick="deleteManualEvent('${ev.id}')" title="削除">${IC_TRASH}</button>` : ''}
    </div>
  `;
  return li;
}

// ============================================================
// Today Section (インライン)
// ============================================================
function renderTodaySection() {
  const todayTasks  = APP_DATA.tasks.filter(t => isInTodaySection(t));
  const todayEvents = (APP_DATA.events || [])
    .filter(ev => isEventToday(ev))
    .sort((a, b) => new Date(a.date) - new Date(b.date));

  const total = todayTasks.length;
  const done  = todayTasks.filter(t => taskState(t) === 'done').length;
  const pct   = total > 0 ? Math.round(done / total * 100) : 0;

  const countEl = document.getElementById('todayProgressCount');
  const fillEl  = document.getElementById('todayProgressFill');
  const doneEl  = document.getElementById('todayProgressDoneLabel');
  if (countEl) countEl.textContent = `${done}/${total}`;
  if (fillEl)  fillEl.style.width  = pct + '%';
  if (doneEl)  doneEl.textContent  = `完了 ${done}件`;

  const container = document.getElementById('todayTaskList');
  if (!container) return;
  container.innerHTML = '';

  if (todayTasks.length === 0 && todayEvents.length === 0) {
    container.innerHTML = '<div class="empty-state" style="padding:20px 0;">今日やることが登録されていません。<br>タスク一覧から ⭐ を押して追加できます。</div>';
    return;
  }

  const ul = document.createElement('ul');
  ul.className = 'todo-list';

  // 本日のイベントを先頭に表示
  if (todayEvents.length > 0) {
    if (todayTasks.length > 0) {
      const evLabel = document.createElement('li');
      evLabel.innerHTML = '<div class="today-events-label">本日のイベント</div>';
      ul.appendChild(evLabel);
    }
    todayEvents.forEach(ev => ul.appendChild(buildTodayEventItem(ev)));
    if (todayTasks.length > 0) {
      const taskLabel = document.createElement('li');
      taskLabel.innerHTML = '<div class="today-tasks-label">タスク</div>';
      ul.appendChild(taskLabel);
    }
  }

  const sorted = [...todayTasks].sort((a, b) => {
    const da = taskState(a) === 'done' ? 1 : 0;
    const db = taskState(b) === 'done' ? 1 : 0;
    if (da !== db) return da - db;
    if (a.deadline && b.deadline) return new Date(a.deadline) - new Date(b.deadline);
    if (a.deadline) return -1; if (b.deadline) return 1;
    return 0;
  });
  sorted.forEach(t => ul.appendChild(buildTodayItem(t)));
  container.appendChild(ul);
}

// ============================================================
// イベントセクション 描画・折りたたみ・手動CRUD
// ============================================================
let _eventsSectionOpen = false;
function toggleEventsSection() {
  _eventsSectionOpen = !_eventsSectionOpen;
  document.getElementById('eventsCollapseHeader').classList.toggle('open', _eventsSectionOpen);
  document.getElementById('eventsCollapseBody').classList.toggle('open', _eventsSectionOpen);
  document.getElementById('eventsCollapseChevron').classList.toggle('open', _eventsSectionOpen);
}

function renderEventsSection() {
  if (!APP_DATA.events) APP_DATA.events = [];
  const all      = [...APP_DATA.events].sort((a,b) => new Date(a.date) - new Date(b.date));
  const upcoming = all.filter(ev => !isEventPast(ev));
  const past     = all.filter(ev => isEventPast(ev));

  const countEl = document.getElementById('eventsCollapseCount');
  if (countEl) {
    const todayCnt = upcoming.filter(isEventToday).length;
    let html = `<span>予定 ${upcoming.length}件</span>`;
    if (todayCnt > 0) html += `<span class="tc-badge ev">${todayCnt} 本日</span>`;
    countEl.innerHTML = html;
  }

  const wrap = document.getElementById('eventList');
  if (!wrap) return;
  wrap.innerHTML = '';

  if (all.length === 0) {
    wrap.innerHTML = '<div class="empty-state">イベントはありません</div>';
    return;
  }

  if (upcoming.length > 0) {
    const ul = document.createElement('ul');
    ul.className = 'event-list';
    upcoming.forEach(ev => ul.appendChild(buildEventItem(ev)));
    wrap.appendChild(ul);
  } else {
    wrap.innerHTML += '<div class="empty-state" style="padding:12px 0;">予定されているイベントはありません</div>';
  }

  if (past.length > 0) {
    const pastBtn = document.createElement('button');
    pastBtn.className = 'done-section-btn';
    pastBtn.style.cssText = 'margin-top:4px;';
    pastBtn.innerHTML = `${IC_CHEVRON}<span>過去のイベント</span><span class="done-section-count" style="background:var(--bg);color:var(--muted-lt);border-color:var(--border);">${past.length}</span>`;
    let pastUl = null;
    pastBtn.onclick = () => {
      const isOpen = pastBtn.classList.toggle('open');
      if (!pastUl) {
        pastUl = document.createElement('ul');
        pastUl.className = 'event-list';
        pastUl.style.cssText = 'border-top:1px solid var(--border-lt);';
        [...past].reverse().forEach(ev => pastUl.appendChild(buildEventItem(ev)));
        wrap.appendChild(pastUl);
      }
      pastUl.style.display = isOpen ? '' : 'none';
    };
    wrap.appendChild(pastBtn);
  }
}

// 手動イベント CRUD
function getManualEvents()        { try { return JSON.parse(localStorage.getItem(LS_MANUAL_EVENTS)||'[]'); } catch { return []; } }
function saveManualEvents(evs)    { localStorage.setItem(LS_MANUAL_EVENTS, JSON.stringify(evs)); }
function loadManualEvents() {
  getManualEvents().forEach(ev => {
    if (!APP_DATA.events.find(x => x.id === ev.id)) APP_DATA.events.push(ev);
  });
}
function deleteManualEvent(id) {
  if (!confirm('このイベントを削除しますか？')) return;
  saveManualEvents(getManualEvents().filter(e => e.id !== id));
  const idx = APP_DATA.events.findIndex(e => e.id === id);
  if (idx !== -1) APP_DATA.events.splice(idx, 1);
  renderAll();
}

// イベント追加モーダル
function openAddEventModal() {
  ['fev-title','fev-date','fev-end','fev-loc','fev-source','fev-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('addEventModal').classList.add('open');
  setTimeout(() => document.getElementById('fev-title').focus(), 50);
}
function closeAddEventModal() {
  document.getElementById('addEventModal').classList.remove('open');
}
function onEventModalClick(e) {
  if (e.target === document.getElementById('addEventModal')) closeAddEventModal();
}
function submitAddEventForm() {
  const title = document.getElementById('fev-title').value.trim();
  if (!title) { document.getElementById('fev-title').focus(); return; }
  const date = document.getElementById('fev-date').value;
  if (!date)  { document.getElementById('fev-date').focus(); return; }

  const id = 'ev_manual_' + Date.now();
  const ev = {
    id,
    title,
    date,
    endTime:    document.getElementById('fev-end').value.trim() || null,
    location:   document.getElementById('fev-loc').value.trim() || null,
    source:     document.getElementById('fev-source').value.trim() || '手動登録',
    notes:      document.getElementById('fev-notes').value.trim() || null,
    sourceFile: null,
    addedDate:  new Date().toISOString().substring(0, 10),
    _manual:    true,
  };

  const evs = getManualEvents();
  evs.push(ev);
  saveManualEvents(evs);
  APP_DATA.events.push(ev);
  closeAddEventModal();
  if (!_eventsSectionOpen) toggleEventsSection();
  renderAll();
}

// タスク一覧 折りたたみトグル

let _tasksSectionOpen = false;
function toggleTasksSection() {
  _tasksSectionOpen = !_tasksSectionOpen;
  const header  = document.getElementById('tasksCollapseHeader');
  const body    = document.getElementById('tasksCollapseBody');
  const chevron = document.getElementById('tasksCollapseChevron');
  header.classList.toggle('open', _tasksSectionOpen);
  body.classList.toggle('open', _tasksSectionOpen);
  chevron.classList.toggle('open', _tasksSectionOpen);
}

function updateTasksCollapseCount() {
  const active   = APP_DATA.tasks.filter(t => taskState(t) !== 'done');
  const overdue  = active.filter(t => taskState(t) === 'overdue').length;
  const urgent   = active.filter(t => taskState(t) === 'urgent').length;
  const soon     = active.filter(t => taskState(t) === 'soon').length;
  const normal   = active.filter(t => taskState(t) === 'normal').length;
  const done     = APP_DATA.tasks.filter(t => taskState(t) === 'done').length;

  const el = document.getElementById('tasksCollapseCount');
  if (!el) return;
  let html = `<span>未対応 ${active.length}件</span>`;
  if (overdue > 0) html += `<span class="tc-badge b-overdue">${overdue}</span>`;
  if (urgent  > 0) html += `<span class="tc-badge b-urgent">${urgent}</span>`;
  if (soon    > 0) html += `<span class="tc-badge b-soon">${soon}</span>`;
  el.innerHTML = html;
}

}

// ============================================================
// Dashboard Launch
// ============================================================
function launchDashboard() {
  const btn = document.getElementById('dashboardBtn');
  const a = document.createElement('a');
  a.href = 'launch-dashboard://';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.6';
  let attempts = 0;
  const MAX = 20;
  const timer = setInterval(async () => {
    attempts++;
    btn.textContent = `起動中... ${attempts}/${MAX}`;
    try {
      await fetch('http://localhost:5000/', { mode: 'no-cors', signal: AbortSignal.timeout(800) });
      clearInterval(timer);
      window.open('http://localhost:5000', '_blank');
      btn.textContent = '成績グラフ作成ページ';
      btn.style.pointerEvents = '';
      btn.style.opacity = '';
    } catch {
      if (attempts >= MAX) {
        clearInterval(timer);
        btn.textContent = '起動失敗 — 再度押して再試行';
        btn.style.pointerEvents = '';
        btn.style.opacity = '';
      }
    }
  }, 1000);
}

// 編集モーダル

let _editingId = null;

function openEditModal(id) {
  _editingId = id;
  const t = APP_DATA.tasks.find(x => x.id === id);
  if (!t) return;
  document.getElementById('fe-title').value    = t.title || '';
  document.getElementById('fe-category').value = t.category || '対応';
  document.getElementById('fe-deadline').value = t.deadline
    ? (t.deadline.length > 10 ? t.deadline.substring(0,16) : t.deadline)
    : '';
  document.getElementById('fe-urgent').checked = !!t.urgent;
  document.getElementById('fe-notes').value    = t.notes || '';
  document.getElementById('fe-source').value   = t.source || '';
  document.getElementById('editTaskModal').classList.add('open');
  setTimeout(() => document.getElementById('fe-title').focus(), 50);
}
function closeEditModal() {
  document.getElementById('editTaskModal').classList.remove('open');
  _editingId = null;
}
function onEditOverlayClick(e) {
  if (e.target === document.getElementById('editTaskModal')) closeEditModal();
}
function submitEditForm() {
  if (!_editingId) return;
  const title = document.getElementById('fe-title').value.trim();
  if (!title) { document.getElementById('fe-title').focus(); return; }

  const fields = {
    title,
    category: document.getElementById('fe-category').value,
    deadline: document.getElementById('fe-deadline').value || null,
    urgent:   document.getElementById('fe-urgent').checked,
    notes:    document.getElementById('fe-notes').value.trim() || null,
    source:   document.getElementById('fe-source').value.trim(),
  };

  const t = APP_DATA.tasks.find(x => x.id === _editingId);
  if (t) Object.assign(t, fields);

  if (t && t._manual) {
    const tasks = getManualTasks().map(m => m.id === _editingId ? {...m, ...fields} : m);
    saveManualTasks(tasks);
  } else {
    saveEdit(_editingId, fields);
  }

  closeEditModal();
  renderAll();
}

// ============================================================
// 手動タスク (localStorage)
// ============================================================
const LS_MANUAL = 'workplace_manual_tasks_v1';

function getManualTasks() {
  try { return JSON.parse(localStorage.getItem(LS_MANUAL) || '[]'); } catch { return []; }
}
function saveManualTasks(tasks) {
  localStorage.setItem(LS_MANUAL, JSON.stringify(tasks));
}
function loadManualTasks() {
  getManualTasks().forEach(t => {
    if (!APP_DATA.tasks.find(x => x.id === t.id)) {
      APP_DATA.tasks.push(t);
    }
  });
}
function deleteManualTask(id) {
  if (!confirm('このタスクを削除しますか？')) return;
  const tasks = getManualTasks().filter(t => t.id !== id);
  saveManualTasks(tasks);
  // APP_DATA からも除去
  const idx = APP_DATA.tasks.findIndex(t => t.id === id);
  if (idx !== -1) APP_DATA.tasks.splice(idx, 1);
  // LS_STATE / LS_TODAY / LS_MEMO もクリーンアップ
  clearState(id);
  setTodayTask(id, false);
  setMemo(id, '');
  renderAll();
}

/* ── 連絡文PDFモーダル ── */
function openPdfModal() {
  const allItems = [
    ...APP_DATA.tasks.map(t => ({file: t.sourceFile, source: t.source, addedDate: t.addedDate})),
    ...APP_DATA.notices.map(n => ({file: n.sourceFile, source: n.source, addedDate: n.addedDate})),
    ...(APP_DATA.events || []).map(e => ({file: e.sourceFile, source: e.source, addedDate: e.addedDate}))
  ].filter(x => x.file && x.file.toLowerCase().endsWith('.pdf'));

  const seen = new Set();
  const files = [];
  allItems.forEach(x => { if (!seen.has(x.file)) { seen.add(x.file); files.push(x); } });
  files.sort((a, b) => (a.source || '').localeCompare(b.source || ''));

  const list = document.getElementById('pdfModalList');
  if (files.length === 0) {
    list.innerHTML = '<p style="color:var(--muted);text-align:center;padding:24px 0;">PDFファイルがありません</p>';
  } else {
    list.innerHTML = files.map((f, i) => `
      <div style="padding:10px 0;${i < files.length-1 ? 'border-bottom:1px solid var(--border);' : ''}">
        <div style="font-size:11px;color:var(--muted);margin-bottom:5px;">${f.source || ''}</div>
        <a href="処理済み/${encodeURIComponent(f.file)}" target="_blank"
           style="color:var(--accent);font-size:13px;font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px;line-height:1.4;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          ${f.file}
        </a>
      </div>
    `).join('');
  }
  document.getElementById('pdfModal').classList.add('open');
}
function closePdfModal() {
  document.getElementById('pdfModal').classList.remove('open');
}
function submitAddTaskForm() {
  const title = document.getElementById('ft-title').value.trim();
  if (!title) { document.getElementById('ft-title').focus(); return; }

  const deadline = document.getElementById('ft-deadline').value || null;
  const id = 'manual_' + Date.now();
  const task = {
    id,
    title,
    source:     '手動登録',
    category:   document.getElementById('ft-category').value,
    deadline:   deadline,
    status:     '未対応',
    urgent:     document.getElementById('ft-urgent').checked,
    notes:      document.getElementById('ft-notes').value.trim() || null,
    sourceFile: null,
    addedDate:  new Date().toISOString().substring(0, 10),
    _manual:    true,
  };

  const tasks = getManualTasks();
  tasks.push(task);
  saveManualTasks(tasks);
  APP_DATA.tasks.push(task);

  closeAddTaskModal();
  renderAll();
}
// Escキーでモーダルを閉じる
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeAddTaskModal(); closeEditModal(); closeAddEventModal(); }
});

(async () => {
  const hadRemoteData = await _loadFromFirestore();
  loadManualTasks();
  loadManualEvents();
  applyStoredStates();
  applyStoredEdits();
  renderAll();
  _setupFirestoreListener();
  if (!hadRemoteData) _syncToFirestore();
})();
</script>
